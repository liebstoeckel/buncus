name: release-please

# Fully driven by GitHub Actions: every push to main updates a release PR
# (changelog + version bump for @liebstoeckel/buncus-server). Merging that PR
# creates the git tag and the GitHub release. Only packages/buncus is released
# (see release-please-config.json); packages/mock-github is not.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    # Only run in the canonical repo; a no-op in forks (which also lack the secret).
    if: github.repository == 'liebstoeckel/buncus'
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          # PAT (or GitHub App token) so the release PR / release event trigger
          # other workflows (e.g. CI on the PR); the default GITHUB_TOKEN does not.
          # Create the secret with Contents: write + Pull requests: write.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
