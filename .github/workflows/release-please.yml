name: release-please

# Fully driven by GitHub Actions: every push to main updates a release PR
# (changelog + version bump for @liebstoeckel/buncus-server). Merging that PR
# creates the git tag and the GitHub release. Only packages/buncus is released
# (see release-please-config.json); packages/mock-github is not.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    # Only run in the canonical repo; a no-op in forks (which also lack the secret).
    if: github.repository == 'liebstoeckel/buncus'
    runs-on: ubuntu-latest
    # Surface the per-path outputs the publish jobs gate on. In manifest mode the
    # action namespaces its outputs by package path, so they are keyed
    # "packages/buncus--<name>" (accessed via the index syntax below).
    outputs:
      release_created: ${{ steps.release.outputs['packages/buncus--release_created'] }}
      tag_name: ${{ steps.release.outputs['packages/buncus--tag_name'] }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          # PAT (or GitHub App token) so the release PR / release event trigger
          # other workflows (e.g. CI on the PR); the default GITHUB_TOKEN does not.
          # Create the secret with Contents: write + Pull requests: write.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

  # Build the multi-arch container and push it to GHCR. Only runs when merging
  # the release PR actually cut a release (tag + GitHub release already exist).
  publish-image:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to ghcr.io/<owner>/<repo>
      id-token: write # OIDC token for keyless cosign signing (Sigstore)
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # QEMU + Buildx so the single Dockerfile builds linux/arm64 as well as
      # linux/amd64. The arm64 leg compiles the Bun binary under emulation, so it
      # is slower; drop it from `platforms` if build time becomes a problem.
      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # built-in token; packages: write is enough

      - uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        id: meta
        env:
          # Apply OCI annotations to the image index too, not just per-arch manifests.
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index
        with:
          images: ghcr.io/${{ github.repository }}
          # Derive the version tags from the release-please tag (e.g. v0.1.0 ->
          # 0.1.0 and 0.1) and always move :latest.
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release-please.outputs.tag_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release-please.outputs.tag_name }}
            type=raw,value=latest
          # Pin the OCI labels explicitly rather than relying on GitHub's repo
          # metadata; metadata-action mirrors these into the annotations output.
          labels: |
            org.opencontainers.image.title=buncus
            org.opencontainers.image.description=Self-hosted, themeable host for GitHub Discussions comments. A Bun-native giscus reimplementation.
            org.opencontainers.image.documentation=https://github.com/liebstoeckel/buncus/tree/main/packages/buncus#readme
            org.opencontainers.image.authors=Leon Kaucher <contact@liebstoeckel.app>
            org.opencontainers.image.licenses=

      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        id: build
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          # SLSA provenance + SBOM attestations, attached to the image index.
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Keyless signing via the workflow's OIDC identity (no key material). Signs
      # the immutable index digest, not a mutable tag. The signature lands in GHCR
      # next to the image and is logged in the Rekor transparency log.
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Sign image
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "ghcr.io/${{ github.repository }}@${DIGEST}"

  # Cross-compile the standalone binary for every supported target and attach the
  # artifacts (plus a checksum file) to the GitHub release. Bun cross-compiles all
  # targets from this one Linux runner, so no per-OS build matrix is needed.
  publish-binaries:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write # upload assets to the release
      id-token: write # OIDC token for keyless cosign signing (Sigstore)
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # server.ts imports the bundled loader/widget/CSS via `with { type: "file" }`,
      # so the assets must exist before `bun build --compile` can embed them.
      - name: Build assets
        run: cd packages/buncus && bun run build:assets

      # Attribution for everything embedded in the binary: the bundled JS
      # dependency closure plus the Bun runtime's own bundled-dependency notice
      # (fetched for the exact Bun version). Written into dist/release so it ships
      # alongside the binaries and is covered by SHA256SUMS.txt below.
      - name: Generate third-party license report
        working-directory: packages/buncus
        run: |
          mkdir -p dist/release
          bun run scripts/third-party-licenses.ts dist/release/THIRD_PARTY_LICENSES.txt

      - name: Compile binaries
        working-directory: packages/buncus
        run: |
          set -euo pipefail
          mkdir -p dist/release
          targets="linux-x64 linux-arm64 linux-x64-musl linux-arm64-musl darwin-x64 darwin-arm64 windows-x64"
          for t in $targets; do
            out="dist/release/buncus-$t"
            [ "$t" = "windows-x64" ] && out="$out.exe"
            echo "::group::compile $t"
            bun build --compile --target="bun-$t" --outfile "$out" src/server.ts
            echo "::endgroup::"
          done
          ( cd dist/release && sha256sum * > SHA256SUMS.txt )
          ls -l dist/release

      # Keyless-sign the checksum file (which covers every binary + the license
      # report). One signature secures the whole set: verify the bundle against
      # SHA256SUMS.txt, then verify each artifact against its line in that file.
      - name: Sign checksums
        working-directory: packages/buncus/dist/release
        run: cosign sign-blob --yes --bundle SHA256SUMS.txt.cosign.bundle SHA256SUMS.txt

      - name: Upload binaries to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # contents: write is enough to add assets
        run: gh release upload "${{ needs.release-please.outputs.tag_name }}" packages/buncus/dist/release/* --clobber

  # Package the Helm chart and push it as an OCI artifact to GHCR, then
  # keyless-cosign-sign the pushed manifest digest. The chart version and
  # appVersion are set from the release tag at package time, so the published
  # chart version always equals the image version for this tag regardless of
  # what charts/buncus/Chart.yaml currently holds (that file is a development
  # baseline; release-please cannot bump it because its extra-files updater
  # rejects paths outside the package directory).
  publish-chart:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push the chart to ghcr.io/<owner>/charts
      id-token: write # OIDC token for keyless cosign signing (Sigstore)
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      # helm is preinstalled on the ubuntu-latest runner image; the built-in token
      # (packages: write) is enough to push. helm and cosign use separate
      # credential stores (helm's own registry config vs. the Docker keychain
      # cosign reads), so authenticate both or the signature upload fails with
      # UNAUTHORIZED even though the chart push succeeded.
      - name: Log in to GHCR
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$GHCR_TOKEN" | helm registry login ghcr.io --username "$GHCR_USER" --password-stdin
          echo "$GHCR_TOKEN" | cosign login ghcr.io --username "$GHCR_USER" --password-stdin

      # Package and push. The tag is vX.Y.Z; --version/--app-version pin the chart
      # to X.Y.Z, so helm writes buncus-X.Y.Z.tgz no matter the in-repo Chart.yaml.
      # Capture the pushed digest from helm's output and sign that immutable digest,
      # mirroring the image's keyless-signing posture.
      - name: Package, push, and sign chart
        env:
          OWNER: ${{ github.repository_owner }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          helm package charts/buncus --version "$version" --app-version "$version" --destination dist-chart
          out=$(helm push "dist-chart/buncus-${version}.tgz" "oci://ghcr.io/${OWNER}/charts" 2>&1 | tee /dev/stderr)
          digest=$(echo "$out" | awk '/[Dd]igest:/ { print $NF }')
          test -n "$digest"
          cosign sign --yes "ghcr.io/${OWNER}/charts/buncus@${digest}"
