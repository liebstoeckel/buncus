# Sample values for the secrets-by-reference path: no plaintext, just a pointer
# to a pre-existing Secret (e.g. one materialized by External Secrets Operator).
# The referenced Secret's keys must be the literal env names buncus reads.
config:
  publicUrl: "https://comments.example.com"
  origins:
    - "https://docs.example.com"

secrets:
  existingSecret: buncus-secrets
